<p>Раздел <strong>Оплаты</strong> содержит данные обо всех поступивших оплатах.</p>
<p>Карточка оплаты содержит: номер, дату оплаты, сумму и ссылку на документ основание. Если нажать на ссылку откроется документ основание. В верхней части находится фильтр по периоду. По умолчанию стоит период 1 год с текущей даты.</p>
